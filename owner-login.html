<!DOCTYPE html>
<html>
<head><title>Signing in...</title>
<style>body{font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f4f5f8}p{color:#64748b}</style>
</head>
<body>
<p>Signing in...</p>
<script>
(async function(){
  try {
    var ADMIN_SECRET = "{{ADMIN_SECRET}}";
    var CLIENT_ID = "stalwart-webui";
    var CALLBACK_URL = window.location.origin + "/admin/oauth/callback";

    // Generate PKCE code verifier (random 64-char string)
    var chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
    var verifier = "";
    var arr = new Uint8Array(64);
    crypto.getRandomValues(arr);
    for (var i = 0; i < 64; i++) verifier += chars[arr[i] % chars.length];

    // Compute S256 code challenge
    var encoder = new TextEncoder();
    var digest = await crypto.subtle.digest("SHA-256", encoder.encode(verifier));
    var challenge = btoa(String.fromCharCode(...new Uint8Array(digest)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");

    // Generate state parameter
    var stateArr = new Uint8Array(16);
    crypto.getRandomValues(stateArr);
    var state = Array.from(stateArr, b => b.toString(16).padStart(2, "0")).join("");

    // Get auth code with PKCE challenge
    var r1 = await fetch("/api/auth", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        type: "authCode",
        accountName: "admin",
        accountSecret: ADMIN_SECRET,
        clientId: CLIENT_ID,
        redirectUri: CALLBACK_URL,
        codeChallenge: challenge,
        codeChallengeMethod: "S256",
        state: state
      })
    });
    if (!r1.ok) throw new Error("/api/auth: " + r1.status);
    var d1 = await r1.json();
    if (d1.type !== "authenticated") throw new Error("auth: " + d1.type);

    // Fetch OIDC config to get token_endpoint
    var r2 = await fetch("/.well-known/openid-configuration");
    var oidc = await r2.json();

    // Set PKCE state in sessionStorage for the WebUI's callback handler
    var prefix = "stalwart-oauth-";
    sessionStorage.setItem(prefix + "code_verifier", verifier);
    sessionStorage.setItem(prefix + "token_endpoint", oidc.token_endpoint);
    sessionStorage.setItem(prefix + "state", state);
    sessionStorage.setItem(prefix + "return_url", "/");
    if (oidc.end_session_endpoint) {
      sessionStorage.setItem(prefix + "end_session_endpoint", oidc.end_session_endpoint);
    }

    // Redirect to WebUI's OAuth callback — it will exchange code for tokens
    window.location.replace(CALLBACK_URL + "?code=" + encodeURIComponent(d1.client_code) + "&state=" + state);
  } catch(e) {
    document.querySelector("p").textContent = "Login failed: " + e.message;
  }
})();
</script>
</body>
</html>
