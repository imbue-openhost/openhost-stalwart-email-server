[app]
name = "stalwart-email-server"
version = "0.1.0"
description = "Stalwart v0.16 mail server - SMTP + JMAP with SQLite"

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
public_paths = ["/jmap/", "/.well-known/jmap", "/.well-known/acme-challenge/", "/auth/token"]

[resources]
memory_mb = 256
cpu_millicores = 200

[data]
app_data = true

[[ports]]
label = "smtp"
container_port = 25
host_port = 25
